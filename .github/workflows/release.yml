name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # Linux all distros
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            binary: myip
            asset: myip-linux-x86_64

          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            binary: myip
            asset: myip-linux-aarch64

          # macOS
          # - target: x86_64-apple-darwin
          #   os: macos-latest
          #   binary: myip
          #   asset: myip-macos-x86_64

          # - target: aarch64-apple-darwin
          #   os: macos-latest
          #   binary: myip
          #   asset: myip-macos-aarch64

          # Windows
          # - target: x86_64-pc-windows-msvc
          #   os: windows-latest
          #   binary: myip.exe
          #   asset: myip-windows-x86_64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: contains(matrix.target, 'linux')
        uses: taiki-e/install-action@cross

      - name: Build (Linux via cross)
        if: contains(matrix.target, 'linux')
        run: cross build --release --target ${{ matrix.target }}

      # - name: Build (macOS / Windows native)
      #   if: "!contains(matrix.target, 'linux')"
      #   run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        shell: bash
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} ${{ matrix.asset }}

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset }}
